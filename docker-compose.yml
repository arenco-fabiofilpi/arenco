name: arenco-crm
services:
  db:
    image: mongodb/mongodb-community-server:latest
    container_name: crm-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGODB_INITDB_DATABASE: ${MONGO_DB}
    command: >
      mongod
        --wiredTigerCacheSizeGB 1
        --maxConns 60
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1.5g

  api:
    build:
      context: ./backend/arenco-clientes
      dockerfile: Dockerfile
    container_name: crm-api
    restart: always
    environment:
      SERVER_PORT: ${CRM_SERVER_PORT}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DB}
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL}
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CRM_SERVER_PORT}/clientes-api/v1/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 1.5g

  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: crm-admin
    restart: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  mongodata: