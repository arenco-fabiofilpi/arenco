server {
    listen 443 ssl;
    server_name crm.arenco.com.br;

    ssl_certificate /etc/letsencrypt/live/crm.arenco.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.arenco.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/crm.arenco;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /clientes-api/ {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name crm.arenco.com.br;
    return 301 https://$host$request_uri;
}